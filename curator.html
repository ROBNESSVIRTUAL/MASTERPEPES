<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MASTERPEPES — Museum Curator</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400&family=Tenor+Sans&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#E0342F;--gold:#C8901A;--gold2:#E8B030;--deep:#060D06;--panel:#0D1A0D;--text:#E8F0D8;--dim:#4A7A4A;--border:#1A3A1A}
body{background:var(--deep);font-family:'Tenor Sans',serif;color:var(--text);text-transform:uppercase;letter-spacing:0.08em;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* TOP BAR */
.topbar{height:50px;background:var(--red);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;border-bottom:2px solid #A02020}
.topbar-title{font-family:'Cinzel Decorative',serif;font-size:13px;color:#FFD700;letter-spacing:0.2em}
.topbar-actions{display:flex;gap:10px}
.btn{font-family:'Tenor Sans',serif;font-size:9px;letter-spacing:0.2em;padding:6px 16px;cursor:pointer;border:0.5px solid;transition:all 0.2s;text-transform:uppercase;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-gold{background:#FFD700;color:var(--deep);border-color:#FFD700}.btn-gold:hover{background:#FFE74C}
.btn-outline{background:none;color:rgba(255,255,255,0.8);border-color:rgba(255,255,255,0.4)}.btn-outline:hover{border-color:#fff;color:#fff}
.btn-red{background:var(--red);color:#fff;border-color:rgba(255,255,255,0.5)}.btn-red:hover{background:#C02020}

/* LAYOUT */
.main{flex:1;display:flex;overflow:hidden}

/* SIDEBAR — artwork pool */
.sidebar{width:280px;flex-shrink:0;background:#050C05;border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-head{padding:12px 14px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sidebar-title{font-size:9px;letter-spacing:0.3em;color:var(--gold)}
.search{width:100%;padding:6px 10px;background:#0A140A;border:0.5px solid var(--border);color:var(--text);font-family:'Tenor Sans',serif;font-size:9px;letter-spacing:0.08em;outline:none;margin-top:8px;text-transform:none}
.search::placeholder{color:#2A4A2A}
.pool{flex:1;overflow-y:auto;padding:8px}
.pool::-webkit-scrollbar{width:4px}.pool::-webkit-scrollbar-track{background:#050C05}.pool::-webkit-scrollbar-thumb{background:#1A3A1A}

/* ARTWORK CHIP in pool */
.chip{display:flex;align-items:center;gap:8px;padding:6px 8px;border:0.5px solid var(--border);margin-bottom:4px;cursor:grab;background:#0A140A;transition:all 0.15s;user-select:none;border-radius:2px}
.chip:active{cursor:grabbing;opacity:0.7}
.chip.dragging{opacity:0.4;border-color:var(--gold)}
.chip.placed{opacity:0.35;border-color:#0F1F0F;background:#070F07}
.chip-thumb{width:44px;height:36px;object-fit:cover;background:#142814;flex-shrink:0;border:0.5px solid #1A3A1A}
.chip-thumb.portrait-thumb{width:28px;height:44px}
.chip-info{flex:1;min-width:0}
.chip-num{font-size:8px;color:var(--gold);letter-spacing:0.2em}
.chip-title{font-size:8px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;text-transform:none;letter-spacing:0.04em}
.chip-year{font-size:7px;color:var(--dim);margin-top:1px}

/* CANVAS AREA */
.canvas-area{flex:1;overflow:auto;padding:20px;background:#060D06}

/* WING SECTION */
.wing{margin-bottom:28px;border:0.5px solid var(--border);background:#080E08}
.wing-head{background:#0D1A0D;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border)}
.wing-name{font-size:10px;letter-spacing:0.3em;color:var(--gold)}
.wing-sub{font-size:8px;letter-spacing:0.15em;color:var(--dim);margin-top:2px}
.wing-count{font-size:8px;letter-spacing:0.15em;color:var(--dim)}

.wall{padding:10px 14px;border-bottom:0.5px solid #0A160A}
.wall:last-child{border-bottom:none}
.wall-label{font-size:8px;letter-spacing:0.25em;color:var(--dim);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.wall-label span{color:var(--gold2);font-size:7px}

/* DROP ZONE (the wall's slot row) */
.wall-slots{display:flex;flex-wrap:wrap;gap:8px;min-height:68px;padding:6px;background:#060D06;border:0.5px dashed #0F1F0F;transition:border-color 0.2s}
.wall-slots.drag-over{border-color:var(--gold);background:#0A1A08}
.wall-slots.drag-over::after{content:'Drop here';font-size:8px;color:var(--gold);letter-spacing:0.2em;display:flex;align-items:center;justify-content:center;width:100%;opacity:0.6}

/* Placed artwork slot */
.slot{position:relative;cursor:grab;border:0.5px solid #1A3A1A;background:#0A140A;transition:all 0.15s;user-select:none}
.slot:hover{border-color:var(--gold)}
.slot.landscape{width:80px;height:64px}
.slot.portrait{width:48px;height:80px}
.slot img{width:100%;height:100%;object-fit:cover;display:block}
.slot .slot-num{position:absolute;bottom:2px;left:2px;font-size:6px;color:#FFD700;letter-spacing:0.1em;background:rgba(0,0,0,0.7);padding:1px 3px;line-height:1}
.slot .slot-remove{position:absolute;top:1px;right:1px;width:14px;height:14px;background:rgba(200,0,0,0.8);color:#fff;font-size:9px;display:none;align-items:center;justify-content:center;cursor:pointer;line-height:1}
.slot:hover .slot-remove{display:flex}
.slot .slot-orient{position:absolute;bottom:2px;right:2px;width:14px;height:14px;background:rgba(200,144,26,0.85);color:var(--deep);font-size:7px;display:none;align-items:center;justify-content:center;cursor:pointer;font-weight:bold}
.slot:hover .slot-orient{display:flex}

/* UNPLACED banner */
.unplaced-banner{background:#1A0505;border:0.5px solid #5A1010;padding:8px 14px;margin:0 14px 10px;font-size:8px;letter-spacing:0.15em;color:#FF7060;display:none}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(200,144,26,0.95);color:var(--deep);font-size:9px;letter-spacing:0.2em;padding:8px 20px;pointer-events:none;opacity:0;transition:opacity 0.3s;z-index:999}
#toast.show{opacity:1}
</style>
</head>

</div>

// ── STATE ─────────────────────────────────────────────────────────────────────
// layout[wallId] = [{num, orient:'landscape'|'portrait'}, ...]
let layout = {};
ROOMS.forEach(room => room.walls.forEach(w => layout[w.id] = []));

// Track which artworks are placed
function placedNums(){
  const s=new Set();
  Object.values(layout).forEach(slots=>slots.forEach(s2=>s.add(s2.num)));
  return s;
}

// ── DRAG STATE ────────────────────────────────────────────────────────────────
let dragNum=null, dragFromWall=null, dragFromIdx=null;

// ── RENDER ────────────────────────────────────────────────────────────────────
function imgUrl(work){ return work.url; }
function thumbEl(work, orient, small=false){
  const img=document.createElement('img');
  img.src=imgUrl(work);
  img.alt=work.t;
  img.crossOrigin='anonymous';
  if(small){
    img.className = orient==='portrait'?'chip-thumb portrait-thumb':'chip-thumb';
  }
  return img;
}

function renderPool(){
  const pool=document.getElementById('pool');
  const query=document.getElementById('searchBox').value.toLowerCase();
  const placed=placedNums();
  pool.innerHTML='';
  PAGES.forEach(work=>{
    const match=!query||(work.t.toLowerCase().includes(query)||String(work.num).includes(query));
    if(!match)return;
    const isPlaced=placed.has(work.num);
    const chip=document.createElement('div');
    chip.className='chip'+(isPlaced?' placed':'');
    chip.draggable=true;
    chip.dataset.num=work.num;
    // Determine current orient if placed
    let orient='landscape';
    Object.values(layout).forEach(slots=>{const s=slots.find(s=>s.num===work.num);if(s)orient=s.orient;});
    chip.innerHTML=`
      <img src="${imgUrl(work)}" alt="${work.t}" class="${orient==='portrait'?'chip-thumb portrait-thumb':'chip-thumb'}" crossorigin="anonymous">
      <div class="chip-info">
        <div class="chip-num">No. ${work.num}</div>
        <div class="chip-title">${work.t}</div>
        <div class="chip-year">${work.y}</div>
      </div>`;
    chip.addEventListener('dragstart',e=>{
      dragNum=work.num; dragFromWall=null; dragFromIdx=null;
      e.dataTransfer.effectAllowed='move';
      chip.classList.add('dragging');
    });
    chip.addEventListener('dragend',()=>chip.classList.remove('dragging'));
    pool.appendChild(chip);
  });
}

function renderWings(){
  const area=document.getElementById('canvasArea');
  area.innerHTML='';
  const placed=placedNums();

  ROOMS.forEach(room=>{
    const totalPlaced=room.walls.reduce((a,w)=>a+layout[w.id].length,0);
    const wing=document.createElement('div');wing.className='wing';
    wing.innerHTML=`
      <div class="wing-head">
        <div><div class="wing-name">${room.name}</div><div class="wing-sub">${room.sub}</div></div>
        <div class="wing-count">${totalPlaced} / 25 placed</div>
      </div>`;

    room.walls.forEach(wallDef=>{
      const slots=layout[wallDef.id];
      const wallDiv=document.createElement('div');wallDiv.className='wall';
      wallDiv.innerHTML=`<div class="wall-label">${wallDef.label}<span>${slots.length} artworks</span></div>`;
      const slotsDiv=document.createElement('div');slotsDiv.className='wall-slots';
      slotsDiv.dataset.wall=wallDef.id;

      // Drag-over highlight
      slotsDiv.addEventListener('dragover',e=>{e.preventDefault();slotsDiv.classList.add('drag-over');});
      slotsDiv.addEventListener('dragleave',()=>slotsDiv.classList.remove('drag-over'));
      slotsDiv.addEventListener('drop',e=>{
        e.preventDefault();slotsDiv.classList.remove('drag-over');
        if(dragNum===null)return;
        const targetWall=wallDef.id;
        // Remove from source if dragging from a wall
        if(dragFromWall&&dragFromWall!==targetWall){
          layout[dragFromWall]=layout[dragFromWall].filter((_,i)=>i!==dragFromIdx);
        }
        // Avoid duplicate on same wall
        if(!layout[targetWall].find(s=>s.num===dragNum)){
          // Determine orient from pool
          let orient='landscape';
          Object.values(layout).forEach(ss=>{const s=ss.find(s=>s.num===dragNum);if(s)orient=s.orient;});
          layout[targetWall].push({num:dragNum,orient});
        }
        dragNum=null;dragFromWall=null;dragFromIdx=null;
        render();
      });

      // Render placed slots
      slots.forEach((entry,idx)=>{
        const work=PAGES.find(p=>p.num===entry.num);if(!work)return;
        const slotDiv=document.createElement('div');
        slotDiv.className=`slot ${entry.orient}`;
        slotDiv.draggable=true;
        const img=document.createElement('img');
        img.src=imgUrl(work);img.crossOrigin='anonymous';
        img.style.cssText='width:100%;height:100%;object-fit:cover;display:block';
        slotDiv.appendChild(img);
        // Number badge
        const badge=document.createElement('div');badge.className='slot-num';badge.textContent='#'+work.num;slotDiv.appendChild(badge);
        // Remove button
        const rem=document.createElement('div');rem.className='slot-remove';rem.textContent='×';
        rem.onclick=e=>{e.stopPropagation();layout[wallDef.id].splice(idx,1);render();};
        slotDiv.appendChild(rem);
        // Orient toggle
        const ort=document.createElement('div');ort.className='slot-orient';ort.textContent='⇕';
        ort.title='Toggle portrait/landscape';
        ort.onclick=e=>{
          e.stopPropagation();
          entry.orient=entry.orient==='landscape'?'portrait':'landscape';
          render();
        };
        slotDiv.appendChild(ort);
        // Drag from wall
        slotDiv.addEventListener('dragstart',e=>{
          dragNum=work.num;dragFromWall=wallDef.id;dragFromIdx=idx;
          e.dataTransfer.effectAllowed='move';
        });
        slotsDiv.appendChild(slotDiv);
      });

      wallDiv.appendChild(slotsDiv);wing.appendChild(wallDiv);
    });
    area.appendChild(wing);
  });
}

function render(){ renderPool(); renderWings(); }

// ── FILTER ────────────────────────────────────────────────────────────────────
function filterPool(){ renderPool(); }

// ── DEFAULT LAYOUT ────────────────────────────────────────────────────────────
function applyDefaultLayout(){
  layout={};
  ROOMS.forEach(room=>room.walls.forEach(w=>layout[w.id]=[]));
  const STEP=24.0,MARGIN=14.0,DPAD=10.0;
  function countSlots(rA,rB,gaps){
    let n=0,p=rA+MARGIN;
    while(p<=rB-MARGIN){if(!gaps.some(([g1,g2])=>p>g1-DPAD&&p<g2+DPAD))n++;p+=STEP;}
    return n;
  }
  ROOMS.forEach(room=>{
    const slice=PAGES.slice(room.works[0],room.works[1]+1);
    let wi=0;
    room.walls.forEach(wallDef=>{
      if(wi>=slice.length)return;
      const n=countSlots(wallDef.range[0],wallDef.range[1],wallDef.gaps);
      for(let i=0;i<n&&wi<slice.length;i++,wi++){
        // Simple heuristic: longer title = portrait (placeholder — user can override)
        const orient='landscape';
        layout[wallDef.id].push({num:slice[wi].num,orient});
      }
    });
  });
}

function resetLayout(){ applyDefaultLayout(); render(); toast('Layout reset to default'); }
function clearAll(){
  layout={};ROOMS.forEach(r=>r.walls.forEach(w=>layout[w.id]=[]));
  render();toast('All artworks cleared — drag from pool to place');
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
function exportLayout(){
  const out={};
  Object.entries(layout).forEach(([wallId,slots])=>{ if(slots.length) out[wallId]=slots; });
  const json=JSON.stringify(out,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='museum_layout.json';a.click();
  toast('Exported museum_layout.json — place in your project folder');
}

// ── TOAST ────────────────────────────────────────────────────────────────────
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}

// ── INIT ─────────────────────────────────────────────────────────────────────
applyDefaultLayout();
render();

body{background:#87CEEB;overflow:hidden;font-family:'Tenor Sans',serif;text-transform:uppercase;letter-spacing:0.08em;color:#E8F0D8}

#intro{position:fixed;inset:0;background:rgba(4,8,4,0.93);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:90;cursor:pointer}

.intro-ring{width:84px;height:84px;border:0.5px solid #C8901A;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:22px;animation:pulse 2.4s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.55;transform:scale(0.96)}}
.intro-icon{font-size:26px;color:#C8901A}
.intro-cta{font-size:11px;letter-spacing:0.5em;color:#C8901A;margin-bottom:10px}
.intro-hint{font-size:8px;letter-spacing:0.22em;color:#2A5A2A;text-align:center;line-height:2.2}
#cross{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:18px;height:18px;pointer-events:none;display:none}
#cross::before,#cross::after{content:'';position:absolute;background:rgba(200,144,26,0.8)}
#cross::before{width:1px;height:100%;left:50%;transform:translateX(-50%)}
#cross::after{width:100%;height:1px;top:50%;transform:translateY(-50%)}
#rlabel{position:fixed;top:20px;left:50%;transform:translateX(-50%);text-align:center;display:none;pointer-events:none}
.rl-n{font-size:11px;letter-spacing:0.45em;color:#C8901A}
.rl-s{font-size:8px;letter-spacing:0.3em;color:#FFB0A0;margin-top:3px}
#ainfo{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:rgba(3,6,3,0.97);border:0.5px solid #C8901A;padding:14px 30px;text-align:center;display:none;pointer-events:none;min-width:280px;max-width:500px}
.ai-n{font-size:8px;letter-spacing:0.3em;color:#C8901A;margin-bottom:5px}
.ai-t{font-size:13px;letter-spacing:0.04em;color:#E8F0D8;margin-bottom:5px;line-height:1.35;text-transform:none}
.ai-y{font-size:8px;letter-spacing:0.2em;color:#4A8A4A}
.ai-m{font-size:8px;letter-spacing:0.06em;color:#2A5A2A;margin-top:3px;text-transform:none}
#ctrl{position:fixed;bottom:20px;right:20px;font-size:7px;letter-spacing:0.2em;color:#1E3A1E;line-height:2.4;text-align:right;display:none;pointer-events:none}
#mmap{position:fixed;bottom:20px;left:20px;display:none}
#mmap canvas{border:0.5px solid #1E3A1E;background:rgba(3,6,3,0.85)}
#back{position:fixed;top:20px;left:20px;font-size:9px;letter-spacing:0.22em;color:rgba(200,144,26,0.75);border:0.5px solid rgba(200,144,26,0.25);padding:7px 16px;cursor:pointer;background:rgba(3,6,3,0.75);text-decoration:none;display:none;transition:all 0.2s}
#back:hover{border-color:#C8901A;background:rgba(200,144,26,0.1)}

function makeRedFloor(){
  // Polished red tile — #E0342F base with subtle sheen variation
  const C=document.createElement('canvas');C.width=C.height=512;
  const ctx=C.getContext('2d');
  // Base red
  ctx.fillStyle='#E0342F';ctx.fillRect(0,0,512,512);
  // Subtle tile grid
  ctx.strokeStyle='rgba(180,20,15,0.3)';ctx.lineWidth=1.5;
  for(let i=0;i<=512;i+=64){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,512);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(512,i);ctx.stroke();}
  // Gloss highlight per tile
  for(let tx=0;tx<8;tx++)for(let ty=0;ty<8;ty++){
    const grd=ctx.createRadialGradient(tx*64+20,ty*64+16,0,tx*64+32,ty*64+32,36);
    grd.addColorStop(0,'rgba(255,120,100,0.18)');grd.addColorStop(1,'rgba(255,120,100,0)');
    ctx.fillStyle=grd;ctx.fillRect(tx*64,ty*64,64,64);
  }
  const t=new THREE.CanvasTexture(C);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(20,26);return t;
}

function makePlaceholder(work){
  const C=document.createElement('canvas');C.width=256;C.height=256;
  const ctx=C.getContext('2d');
  // Red background matching walls
  ctx.fillStyle='#C02820';ctx.fillRect(0,0,256,256);
  // Gold frame lines
  ctx.strokeStyle='#DAA520';ctx.lineWidth=3;ctx.strokeRect(4,4,248,248);
  ctx.strokeStyle='rgba(218,165,32,0.4)';ctx.lineWidth=1;ctx.strokeRect(12,12,232,232);
  ctx.fillStyle='#FFD700';ctx.font='bold 13px Arial';ctx.textAlign='center';
  ctx.fillText('No. '+work.num,128,36);
  ctx.fillStyle='#FFE4C4';ctx.font='10px Arial';
  const words=work.t.split(' ');let line='',y=64;
  words.forEach(w=>{const test=line+w+' ';if(ctx.measureText(test).width>234&&line){ctx.fillText(line.trim(),128,y);line=w+' ';y+=16;}else line=test;});
  ctx.fillText(line.trim(),128,y);
  ctx.fillStyle='rgba(255,215,0,0.7)';ctx.font='9px Arial';
  ctx.fillText(work.y,128,205);
  ctx.fillStyle='rgba(255,228,196,0.5)';ctx.font='8px Arial';
  ctx.fillText('Walk closer to load image',128,222);
  return new THREE.CanvasTexture(C);
}

const H=18, WT=0.5;  // H=18 units ≈ Louvre scale

function addBox(w,h,d,mat,x,y,z,col=true){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(x,y,z);scene.add(m);if(col)colliders.push(m);return m;
}
function segs(a,b,gaps){
  const gs=[...gaps].sort((p,q)=>p[0]-q[0]);const out=[];let cur=a;
  gs.forEach(([g1,g2])=>{if(g1>cur)out.push([cur,g1]);cur=g2;});
  if(cur<b)out.push([cur,b]);return out;
}
// Wall constant Z, runs along X
function wallX(xa,xb,z,gaps=[]){
  segs(xa,xb,gaps).forEach(([a,b])=>{
    const l=b-a,cx=(a+b)/2;
    addBox(l,H,WT,wallDblMat,cx,H/2,z);
    // Base and crown trim (darker red)
    addBox(l,0.6,WT+0.04,moldMat,cx,0.3,z,false);
    addBox(l,0.6,WT+0.04,moldMat,cx,H-0.3,z,false);
  });
}
// Wall constant X, runs along Z
function wallZ(x,za,zb,gaps=[]){
  segs(za,zb,gaps).forEach(([a,b])=>{
    const l=b-a,cz=(a+b)/2;
    addBox(WT,H,l,wallDblMat,x,H/2,cz);
    addBox(WT+0.04,0.6,l,moldMat,x,0.3,cz,false);
    addBox(WT+0.04,0.6,l,moldMat,x,H-0.3,cz,false);
  });
}

const artSpots=[];
const LOAD_DIST=35;
const LOAD_QUEUE=[];
let activeLoads=0;
const MAX_CONCURRENT=4;

function processQueue(){
  while(activeLoads<MAX_CONCURRENT&&LOAD_QUEUE.length>0){
    const{artMat,url}=LOAD_QUEUE.shift();
    activeLoads++;
    const img=new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>{
      try{
        const tex=new THREE.Texture(img);
        tex.minFilter=THREE.LinearFilter;tex.magFilter=THREE.LinearFilter;
        tex.needsUpdate=true;artMat.map=tex;artMat.needsUpdate=true;
      }catch(e){}
      activeLoads--;processQueue();
    };
    img.onerror=()=>{activeLoads--;processQueue();};
    img.src=url;
  }
}

// ── ARTWORK PLACEMENT ─────────────────────────────────────────────────────────
// STEP=7: ~2 full room-widths between each piece — very museum-like spacing
const AW=2.4,AH=2.0,STEP=7.0,AY=3.0,MARGIN=5.0,DPAD=4.0;

function placeLine(works,wi,wallType,coord,isMin,rangeA,rangeB,gaps){
  if(wi[0]>=works.length)return;
  const off=(WT/2+0.1)*(isMin?1:-1);
  let p=rangeA+MARGIN;
  while(p<=rangeB-MARGIN){
    if(wi[0]>=works.length)break;
    const blocked=gaps.some(([g1,g2])=>p>g1-DPAD&&p<g2+DPAD);
    if(!blocked){
      const work=works[wi[0]++];
      let x,y=AY,z,rotY;
      if(wallType==='Z'){x=p;z=coord+off;rotY=isMin?0:Math.PI;}
      else{x=coord+off;z=p;rotY=isMin?-Math.PI/2:Math.PI/2;}
      placeFrame(work,x,y,z,rotY);
    }
    p+=STEP;
  }
}

function placeFrame(work,x,y,z,rotY){
  const FW=AW+0.4,FH=AH+0.4;
  // Gold frame — thick, prominent
  const frm=new THREE.Mesh(new THREE.BoxGeometry(FW,FH,0.18),frameHi);
  frm.position.set(x,y,z);frm.rotation.y=rotY;scene.add(frm);
  // Artwork canvas
  const ph=makePlaceholder(work);
  const artMat=new THREE.MeshBasicMaterial({map:ph,side:THREE.FrontSide});
  const art=new THREE.Mesh(new THREE.PlaneGeometry(AW,AH),artMat);
  art.position.set(x,y,z);
  art.position.x+=Math.sin(rotY)*0.1;
  art.position.z+=Math.cos(rotY)*0.1;
  art.rotation.y=rotY;scene.add(art);
  // Gold placard below — museum style
  const pl=new THREE.Mesh(new THREE.BoxGeometry(1.4,0.3,0.08),frameLo);
  pl.position.set(x,y-AH/2-0.28,z);
  pl.position.x+=Math.sin(rotY)*0.08;pl.position.z+=Math.cos(rotY)*0.08;
  pl.rotation.y=rotY;scene.add(pl);
  const spot=new THREE.Vector3(x,y,z);
  spot.x+=Math.sin(rotY)*1.0;spot.z+=Math.cos(rotY)*1.0;
  artSpots.push({pos:spot,work,artMat,loaded:false});
}

function tryMove(dx,dz){
  const nx=Math.max(-99.5,Math.min(99.5,camera.position.x+dx));
  const nz=Math.max(-99.5,Math.min(129.5,camera.position.z+dz));
  const d=new THREE.Vector3(nx-camera.position.x,0,nz-camera.position.z).normalize();
  rcaster.set(new THREE.Vector3(camera.position.x,1.5,camera.position.z),d);

// ── MINIMAP ───────────────────────────────────────────────────────────────────
const mmC=document.getElementById('mm'),mmCtx=mmC.getContext('2d');
const MW=mmC.width,MH=mmC.height;
function w2m(x,z){return[(x+100)*MW/200,(z+100)*MH/230];}
const RCOLS={w1:'#3A0A08',w2:'#3A0A08',w3:'#4A0C0A',w4:'#4A0C0A',w5:'#3A0A08',w6:'#3A0A08',rt:'#5A1410',en:'#4A1010'};
function drawMap(){
  mmCtx.fillStyle='rgba(30,5,5,0.95)';mmCtx.fillRect(0,0,MW,MH);
  RDEFS.forEach(r=>{
    const[mx1,my1]=w2m(r.x1,r.z1),[mx2,my2]=w2m(r.x2,r.z2);
    mmCtx.fillStyle=RCOLS[r.id]||'#3A0A08';mmCtx.fillRect(mx1,my1,mx2-mx1,my2-my1);
    mmCtx.strokeStyle='#8A2020';mmCtx.lineWidth=0.6;mmCtx.strokeRect(mx1,my1,mx2-mx1,my2-my1);
    if(r.id.startsWith('w')){
      mmCtx.fillStyle='#C8901A';mmCtx.font='7px Arial';mmCtx.textAlign='center';
      const[cx,cy]=w2m((r.x1+r.x2)/2,(r.z1+r.z2)/2);
      mmCtx.fillText(r.n.substring(0,6),cx,cy);
    }
  });
  const[px,py]=w2m(camera.position.x,camera.position.z);
  mmCtx.strokeStyle='#FFD700';mmCtx.lineWidth=1.5;
  mmCtx.beginPath();mmCtx.moveTo(px,py);mmCtx.lineTo(px+Math.sin(-yaw)*11,py+Math.cos(-yaw)*11);mmCtx.stroke();
  mmCtx.fillStyle='#FFD700';mmCtx.beginPath();mmCtx.arc(px,py,3.5,0,Math.PI*2);mmCtx.fill();
}

// ── DETECTION ─────────────────────────────────────────────────────────────────
let curRoom=null,lastArt=null;
const ainfoEl=document.getElementById('ainfo');
function detectRoom(){
  const cx=camera.position.x,cz=camera.position.z;
  for(const r of RDEFS){
    if(cx>r.x1&&cx<r.x2&&cz>r.z1&&cz<r.z2){
      if(r.id!==curRoom){curRoom=r.id;document.getElementById('rln').textContent=r.n;document.getElementById('rls').textContent=r.s;}
      return;
    }
  }
}
function detectArt(){
  const cp=camera.position;let best=null,bd=5.5;
  artSpots.forEach(a=>{
    const d=cp.distanceTo(a.pos);
    if(!a.loaded&&d<LOAD_DIST){a.loaded=true;LOAD_QUEUE.push({artMat:a.artMat,url:a.work.url});processQueue();}
    if(d<bd){bd=d;best=a;}
  });
  if(best){
    if(best!==lastArt){lastArt=best;const w=best.work;
      document.getElementById('ain').textContent='No. '+w.num;
      document.getElementById('ait').textContent=w.t;
      document.getElementById('aiy').textContent=w.y;
      document.getElementById('aim').textContent=w.mat;
      ainfoEl.style.display='block';}
  }else{lastArt=null;ainfoEl.style.display='none';}
}

// ── LOADING ───────────────────────────────────────────────────────────────────
const ldfill=document.getElementById('ldfill'),ldtxt=document.getElementById('ldtxt');
ldfill.style.width='85%';ldtxt.textContent='Constructing the museum...';
setTimeout(()=>{ldfill.style.width='100%';ldtxt.textContent='Museum ready';
  setTimeout(()=>{document.getElementById('loading').classList.add('fade');
    setTimeout(()=>{document.getElementById('loading').style.display='none';},1200);
    document.getElementById('intro').classList.add('show');},500);},700);

// ── ANIMATE ───────────────────────────────────────────────────────────────────
(function animate(){
  requestAnimationFrame(animate);
  if(entered){
    mDir.set(0,0,0);
    if(keys['KeyW']||keys['ArrowUp'])    mDir.z-=1;
    if(keys['KeyS']||keys['ArrowDown'])  mDir.z+=1;
    if(keys['KeyA']||keys['ArrowLeft'])  mDir.x-=1;
    if(keys['KeyD']||keys['ArrowRight']) mDir.x+=1;
    if(mDir.length()>0){
      mDir.normalize().multiplyScalar(SPEED);
      tmpE.set(0,yaw,0);mDir.applyEuler(tmpE);
      tryMove(mDir.x,0);tryMove(0,mDir.z);
    }
    camera.position.y=1.7;
    detectRoom();detectArt();drawMap();
  }
  renderer.render(scene,camera);
})();
</script>

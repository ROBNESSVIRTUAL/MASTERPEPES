body{background:#B8E898;overflow:hidden;font-family:'Tenor Sans',serif;text-transform:uppercase;letter-spacing:0.08em;color:#E8F0D8}

#intro{position:fixed;inset:0;background:rgba(4,8,4,0.93);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:90;cursor:pointer}

.intro-ring{width:84px;height:84px;border:0.5px solid #C8901A;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:22px;animation:pulse 2.4s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.55;transform:scale(0.96)}}
.intro-icon{font-size:26px;color:#C8901A}
.intro-cta{font-size:11px;letter-spacing:0.5em;color:#C8901A;margin-bottom:10px}
.intro-hint{font-size:8px;letter-spacing:0.22em;color:#2A5A2A;text-align:center;line-height:2.2}
#cross{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:18px;height:18px;pointer-events:none;display:none}
#cross::before,#cross::after{content:'';position:absolute;background:rgba(200,144,26,0.8)}
#cross::before{width:1px;height:100%;left:50%;transform:translateX(-50%)}
#cross::after{width:100%;height:1px;top:50%;transform:translateY(-50%)}
#rlabel{position:fixed;top:20px;left:50%;transform:translateX(-50%);text-align:center;display:none;pointer-events:none}
.rl-n{font-size:11px;letter-spacing:0.45em;color:#C8901A}
.rl-s{font-size:8px;letter-spacing:0.3em;color:#FFB0A0;margin-top:3px}
#ainfo{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:rgba(3,6,3,0.97);border:0.5px solid #C8901A;padding:14px 30px;text-align:center;display:none;pointer-events:none;min-width:300px;max-width:540px}
.ai-n{font-size:8px;letter-spacing:0.3em;color:#C8901A;margin-bottom:5px}
.ai-t{font-size:14px;letter-spacing:0.04em;color:#E8F0D8;margin-bottom:5px;line-height:1.35;text-transform:none}
.ai-y{font-size:9px;letter-spacing:0.2em;color:#4A8A4A}
.ai-m{font-size:8px;letter-spacing:0.06em;color:#2A5A2A;margin-top:3px;text-transform:none}
#ctrl{position:fixed;bottom:20px;right:20px;font-size:7px;letter-spacing:0.2em;color:#1E3A1E;line-height:2.4;text-align:right;display:none;pointer-events:none}
#mmap{position:fixed;bottom:20px;left:20px;display:none}
#mmap canvas{border:0.5px solid #1E3A1E;background:rgba(3,6,3,0.85)}
#back{position:fixed;top:20px;left:20px;font-size:9px;letter-spacing:0.22em;color:rgba(200,144,26,0.75);border:0.5px solid rgba(200,144,26,0.25);padding:7px 16px;cursor:pointer;background:rgba(3,6,3,0.75);text-decoration:none;display:none;transition:all 0.2s}
#back:hover{border-color:#C8901A;background:rgba(200,144,26,0.1)}

// ── LAZY IMAGE LOADER ─────────────────────────────────────────────────────────
const artSpots=[];
const LOAD_DIST=55;
const LOAD_QUEUE=[];
let activeLoads=0;
const MAX_CONCURRENT=4;

function processQueue(){
  while(activeLoads<MAX_CONCURRENT&&LOAD_QUEUE.length>0){
    const{artMat,art,frm,mat2,pl,rotY,anchorY,url}=LOAD_QUEUE.shift();
    activeLoads++;
    const img=new Image();img.crossOrigin='anonymous';
    img.onload=()=>{
      try{
        // Build texture
        const tex=new THREE.Texture(img);
        tex.minFilter=THREE.LinearFilter;tex.magFilter=THREE.LinearFilter;
        tex.needsUpdate=true;
        artMat.map=tex;artMat.needsUpdate=true;

        // Compute correct dimensions — fit within AW×AH bounding box
        const ratio=img.naturalWidth/img.naturalHeight;
        let rW,rH;
        if(ratio>=1){
          // Landscape or square — fix width to AW, adjust height
          rW=AW; rH=AW/ratio;
          // But don't exceed AH
          if(rH>AH){rH=AH;rW=AH*ratio;}
        } else {
          // Portrait — fix height to AH, adjust width
          rH=AH; rW=AH*ratio;
          // But don't exceed AW
          if(rW>AW){rW=AW;rH=AW/ratio;}
        }

        // Update art plane geometry
        art.geometry.dispose();
        art.geometry=new THREE.PlaneGeometry(rW,rH);

        // Recentre art plane vertically on same anchor
        const sin=Math.sin(rotY),cos=Math.cos(rotY);
        art.position.y=anchorY;

        // Update gold frame to wrap the real dimensions
        const FW=rW+0.7,FH=rH+0.7;
        frm.geometry.dispose();frm.geometry=new THREE.BoxGeometry(FW,FH,0.25);
        frm.position.y=anchorY;
        mat2.geometry.dispose();mat2.geometry=new THREE.BoxGeometry(rW+0.18,rH+0.18,0.18);
        mat2.position.y=anchorY;

        // Reposition placard below real bottom edge
        pl.geometry.dispose();pl.geometry=new THREE.BoxGeometry(Math.min(rW,4.5),0.55,0.12);
        pl.position.y=anchorY-rH/2-0.55;

      }catch(e){}
      activeLoads--;processQueue();
    };
    img.onerror=()=>{activeLoads--;processQueue();};
    img.src=url;
  }
}

// ── ARTWORK SIZES ─────────────────────────────────────────────────────────────
// AW×AH = max bounding box. Actual plane scales to real image aspect ratio.
const AW=13.5,AH=11.4,STEP=24.0,AY=8.0,MARGIN=14.0,DPAD=10.0;

function placeLine(works,wi,wallType,coord,isMin,rangeA,rangeB,gaps){
  if(wi[0]>=works.length)return;
  const off=(WT/2+0.12)*(isMin?1:-1);
  let p=rangeA+MARGIN;
  while(p<=rangeB-MARGIN){
    if(wi[0]>=works.length)break;
    const blocked=gaps.some(([g1,g2])=>p>g1-DPAD&&p<g2+DPAD);
    if(!blocked){
      const work=works[wi[0]++];
      let x,y=AY,z,rotY;
      if(wallType==='Z'){x=p;z=coord+off;rotY=isMin?0:Math.PI;}
      else{x=coord+off;z=p;rotY=isMin?-Math.PI/2:Math.PI/2;}
      placeFrame(work,x,y,z,rotY);
    }
    p+=STEP;
  }
}

function placeFrame(work,x,y,z,rotY){
  // Start with square placeholder proportions — will resize when real image loads
  const initW=AW, initH=AH;
  const FW=initW+0.7, FH=initH+0.7;
  const sin=Math.sin(rotY),cos=Math.cos(rotY);

  const frm=new THREE.Mesh(new THREE.BoxGeometry(FW,FH,0.25),frameHi);
  frm.position.set(x,y,z);frm.rotation.y=rotY;scene.add(frm);

  const mat2=new THREE.Mesh(new THREE.BoxGeometry(initW+0.18,initH+0.18,0.18),frameLo);
  mat2.position.set(x,y,z);
  mat2.position.x+=sin*0.05;mat2.position.z+=cos*0.05;
  mat2.rotation.y=rotY;scene.add(mat2);

  const ph=makePlaceholder(work);
  const artMat=new THREE.MeshBasicMaterial({map:ph,side:THREE.FrontSide});
  const art=new THREE.Mesh(new THREE.PlaneGeometry(initW,initH),artMat);
  art.position.set(x,y,z);
  art.position.x+=sin*0.14;art.position.z+=cos*0.14;
  art.rotation.y=rotY;scene.add(art);

  const pl=new THREE.Mesh(new THREE.BoxGeometry(Math.min(initW,4.5),0.55,0.12),frameLo);
  pl.position.set(x,y-initH/2-0.55,z);
  pl.position.x+=sin*0.12;pl.position.z+=cos*0.12;
  pl.rotation.y=rotY;scene.add(pl);

  const spot=new THREE.Vector3(x,y,z);
  spot.x+=sin*1.5;spot.z+=cos*1.5;
  // Store art, frm, mat2, pl refs so loader can resize them
  artSpots.push({pos:spot,work,artMat,art,frm,mat2,pl,rotY,anchorY:y,loaded:false});
}

  ['Z', 120, true,   40, 250,[[120,140]]],
  ['Z', 300,false,   40, 250,[]],
  ['X',  40, true,  120, 300,[[148,192]]],
  ['X', 250,false,  120, 300,[]],
]},
];

// ── ROOM DEFS (for detection + minimap) ───────────────────────────────────────
const RDEFS=[
  {id:'w1',n:'Wing I',   s:'The Ancient World',        x1:-250,x2:-40,z1:-250,z2: -80},
  {id:'w2',n:'Wing II',  s:'Early Civilisations',      x1:  40,x2:250,z1:-250,z2: -80},
  {id:'w3',n:'Wing III', s:'Medieval & Gothic',        x1:-250,x2:-40,z1:-100,z2: 120},
  {id:'w4',n:'Wing IV',  s:'Renaissance & Beyond',     x1:  40,x2:250,z1:-100,z2: 120},
  {id:'w5',n:'Wing V',   s:'Baroque & Enlightenment',  x1:-250,x2:-40,z1: 120,z2: 300},
  {id:'w6',n:'Wing VI',  s:'Modern & Contemporary',    x1:  40,x2:250,z1: 120,z2: 300},
  {id:'rt',n:'Central Rotunda',s:'Overview',           x1: -40,x2:  40,z1:-100,z2: 120},
  {id:'en',n:'Grand Hall',s:'Entrance',                x1: -40,x2:  40,z1: 120,z2: 340},
];

// ── LAYOUT LOADER ─────────────────────────────────────────────────────────────
function buildDefaultLayout(){
  const ST=24.0,MG=14.0,DP=10.0;
  function countSlots(rA,rB,gaps){
    let n=0,p=rA+MG;
    while(p<=rB-MG){if(!gaps.some(([g1,g2])=>p>g1-DP&&p<g2+DP))n++;p+=ST;}
    return n;
  }
  const layout={};
  ROOMS.forEach(room=>{
    room.walls.forEach(([type,coord,isMin,r0,r1,gaps],wi)=>{
      layout[room.id+'_'+['N','S','W','E'][wi]]=[];
    });
  });
  ROOMS.forEach(room=>{
    const slice=PAGES.slice(room.r[0],room.r[1]+1);let wi2=0;
    room.walls.forEach(([type,coord,isMin,r0,r1,gaps],wi)=>{
      const wallId=room.id+'_'+['N','S','W','E'][wi];
      const n=countSlots(r0,r1,gaps);
      for(let i=0;i<n&&wi2<slice.length;i++,wi2++){
        layout[wallId].push({num:slice[wi2].num,orient:'landscape'});
      }
    });
  });
  return layout;
}

function applyLayout(layout){
  const ST=24.0,MG=14.0,DP=10.0;
  ROOMS.forEach(room=>{
    room.walls.forEach(([type,coord,isMin,r0,r1,gaps],wi)=>{
      const wallId=room.id+'_'+['N','S','W','E'][wi];
      const entries=layout[wallId];
      if(!entries||!entries.length)return;
      const off=(WT/2+0.12)*(isMin?1:-1);
      const slotPositions=[];
      let p=r0+MG;
      while(p<=r1-MG){
        if(!gaps.some(([g1,g2])=>p>g1-DP&&p<g2+DP))slotPositions.push(p);
        p+=ST;
      }
      entries.forEach((entry,idx)=>{
        if(idx>=slotPositions.length)return;
        const work=PAGES.find(pg=>pg.num===entry.num);if(!work)return;
        const pos=slotPositions[idx];
        let x,y=AY,z,rotY;
        if(type==='Z'){x=pos;z=coord+off;rotY=isMin?0:Math.PI;}
        else{x=coord+off;z=pos;rotY=isMin?-Math.PI/2:Math.PI/2;}
        placeFrame(work,x,y,z,rotY);
      });
    });
  });
}

fetch('museum_layout.json')
  .then(r=>r.ok?r.json():null).catch(()=>null)
  .then(custom=>{
    if(custom&&Object.keys(custom).length>0){console.log('Custom layout loaded');applyLayout(custom);}
    else{console.log('Default layout');applyLayout(buildDefaultLayout());}
  });

// ── CONTROLS ──────────────────────────────────────────────────────────────────
let entered=false,locked=false,yaw=Math.PI,pitch=0;
let dragging=false,lastMX=0,lastMY=0;
const keys={};
document.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space')e.preventDefault();});
document.addEventListener('keyup',  e=>keys[e.code]=false);
const HUD=['cross','rlabel','ctrl','mmap','back'];
function enterMuseum(){
  if(entered)return;entered=true;
  document.getElementById('intro').style.display='none';
  HUD.forEach(id=>document.getElementById(id).style.display='block');
  try{rc.requestPointerLock();}catch(e){}
}
document.getElementById('intro').addEventListener('click',enterMuseum);
rc.addEventListener('click',()=>{if(!entered)enterMuseum();else try{rc.requestPointerLock();}catch(e){}});
document.addEventListener('pointerlockchange',()=>{locked=document.pointerLockElement===rc;});
document.addEventListener('mousemove',e=>{
  if(!entered)return;
  if(locked){yaw-=e.movementX*0.0022;pitch-=e.movementY*0.0022;}
  else if(dragging){yaw-=(e.clientX-lastMX)*0.004;pitch-=(e.clientY-lastMY)*0.004;lastMX=e.clientX;lastMY=e.clientY;}
  pitch=Math.max(-1.4,Math.min(1.4,pitch));
  camera.rotation.y=yaw;camera.rotation.x=pitch;
});
rc.addEventListener('mousedown',e=>{dragging=true;lastMX=e.clientX;lastMY=e.clientY;});
document.addEventListener('mouseup',()=>dragging=false);

// ── MOVEMENT ──────────────────────────────────────────────────────────────────
const mDir=new THREE.Vector3(),tmpE=new THREE.Euler(0,0,0,'YXZ');
const SPEED=0.28,PR=0.7;
const rcaster=new THREE.Raycaster();
function tryMove(dx,dz){
  const nx=Math.max(-249,Math.min(249,camera.position.x+dx));
  const nz=Math.max(-249,Math.min(339,camera.position.z+dz));
  const d=new THREE.Vector3(nx-camera.position.x,0,nz-camera.position.z).normalize();
  rcaster.set(new THREE.Vector3(camera.position.x,1.5,camera.position.z),d);
  const hits=rcaster.intersectObjects(colliders);
  if(hits.length&&hits[0].distance<PR+0.1)return;
  camera.position.x=nx;camera.position.z=nz;
}

// ── MINIMAP ───────────────────────────────────────────────────────────────────
const mmC=document.getElementById('mm'),mmCtx=mmC.getContext('2d');
const MW=mmC.width,MH=mmC.height;
// World x: -250..250=500, z: -250..340=590
function w2m(x,z){return[(x+250)*MW/500,(z+250)*MH/590];}
const RCOLS={w1:'#3A0A08',w2:'#3A0A08',w3:'#4A0C0A',w4:'#4A0C0A',w5:'#3A0A08',w6:'#3A0A08',rt:'#5A1410',en:'#4A1010'};
function drawMap(){
  mmCtx.fillStyle='rgba(30,5,5,0.95)';mmCtx.fillRect(0,0,MW,MH);
  RDEFS.forEach(r=>{
    const[mx1,my1]=w2m(r.x1,r.z1),[mx2,my2]=w2m(r.x2,r.z2);
    mmCtx.fillStyle=RCOLS[r.id]||'#3A0A08';mmCtx.fillRect(mx1,my1,mx2-mx1,my2-my1);
    mmCtx.strokeStyle='#8A2020';mmCtx.lineWidth=0.6;mmCtx.strokeRect(mx1,my1,mx2-mx1,my2-my1);
    if(r.id.startsWith('w')){
      mmCtx.fillStyle='#C8901A';mmCtx.font='6px Arial';mmCtx.textAlign='center';
      const[cx,cy]=w2m((r.x1+r.x2)/2,(r.z1+r.z2)/2);
      mmCtx.fillText(r.n.substring(0,6),cx,cy);
    }
  });
  const[px,py]=w2m(camera.position.x,camera.position.z);
  mmCtx.strokeStyle='#FFD700';mmCtx.lineWidth=1.5;
  mmCtx.beginPath();mmCtx.moveTo(px,py);mmCtx.lineTo(px+Math.sin(-yaw)*10,py+Math.cos(-yaw)*10);mmCtx.stroke();
  mmCtx.fillStyle='#FFD700';mmCtx.beginPath();mmCtx.arc(px,py,3,0,Math.PI*2);mmCtx.fill();
}

// ── DETECTION ─────────────────────────────────────────────────────────────────
let curRoom=null,lastArt=null;
const ainfoEl=document.getElementById('ainfo');
function detectRoom(){
  const cx=camera.position.x,cz=camera.position.z;
  for(const r of RDEFS){if(cx>r.x1&&cx<r.x2&&cz>r.z1&&cz<r.z2){if(r.id!==curRoom){curRoom=r.id;document.getElementById('rln').textContent=r.n;document.getElementById('rls').textContent=r.s;}return;}}
}
function detectArt(){
  const cp=camera.position;let best=null,bd=8;
  artSpots.forEach(a=>{
    const d=cp.distanceTo(a.pos);
    if(!a.loaded&&d<LOAD_DIST){
        a.loaded=true;
        LOAD_QUEUE.push({artMat:a.artMat,art:a.art,frm:a.frm,mat2:a.mat2,pl:a.pl,rotY:a.rotY,anchorY:a.anchorY,url:a.work.url});
        processQueue();
      }
    if(d<bd){bd=d;best=a;}
  });
  if(best){if(best!==lastArt){lastArt=best;const w=best.work;document.getElementById('ain').textContent='No. '+w.num;document.getElementById('ait').textContent=w.t;document.getElementById('aiy').textContent=w.y;document.getElementById('aim').textContent=w.mat;ainfoEl.style.display='block';}}
  else{lastArt=null;ainfoEl.style.display='none';}
}

// ── LOADING ───────────────────────────────────────────────────────────────────
const ldfill=document.getElementById('ldfill'),ldtxt=document.getElementById('ldtxt');
ldfill.style.width='85%';ldtxt.textContent='Constructing the museum...';
setTimeout(()=>{ldfill.style.width='100%';ldtxt.textContent='Museum ready';
  setTimeout(()=>{document.getElementById('loading').classList.add('fade');
    setTimeout(()=>{document.getElementById('loading').style.display='none';},1200);
    document.getElementById('intro').classList.add('show');},500);},700);

// ── ANIMATE ───────────────────────────────────────────────────────────────────
(function animate(){
  requestAnimationFrame(animate);
  if(entered){
    mDir.set(0,0,0);
    if(keys['KeyW']||keys['ArrowUp'])    mDir.z-=1;
    if(keys['KeyS']||keys['ArrowDown'])  mDir.z+=1;
    if(keys['KeyA']||keys['ArrowLeft'])  mDir.x-=1;
    if(keys['KeyD']||keys['ArrowRight']) mDir.x+=1;
    if(mDir.length()>0){mDir.normalize().multiplyScalar(SPEED);tmpE.set(0,yaw,0);mDir.applyEuler(tmpE);tryMove(mDir.x,0);tryMove(0,mDir.z);}
    camera.position.y=1.7;detectRoom();detectArt();drawMap();
  }
  renderer.render(scene,camera);
})();
</script>
